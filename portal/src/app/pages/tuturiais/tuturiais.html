<main class="max-w-7xl mx-auto px-4 py-12">
  
  <header class="mb-12 text-center">
    <h1 class="text-4xl font-extrabold text-[#4a3651] mb-4 tracking-tight">
      Central de Tutoriais
    </h1>
    <p class="text-lg text-[#765a7c] max-w-2xl mx-auto">
      Aprenda as melhores práticas de <span class="text-[#A47DAB] font-semibold">Angular</span> 
      e a estilização moderna com <span class="text-[#A47DAB] font-semibold">Tailwind CSS</span>.
    </p>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
    
    @for (video of videos; track video.id) {
      <div class="bg-[#fbf9fc] rounded-2xl shadow-md border border-[#e4d4e6] overflow-hidden transition-all hover:shadow-2xl hover:-translate-y-1">
        
        <div class="aspect-video bg-black">
          <iframe 
            class="w-full h-full"
            [src]="getSafeUrl(video.id)" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
          </iframe>
        </div>

        <div class="p-6 flex items-center justify-between">
          <div>
            <h2 class="text-xl font-bold text-[#5c4365]">{{ video.title }}</h2>
            <p class="text-sm text-[#8b6b93] mt-1">Tutorial completo de {{ video.tech }}</p>
          </div>
          
          <span [class]="video.tech === 'Angular' ? 'bg-[#f4edf5] text-[#A47DAB] border-[#bda4c4]' : 'bg-[#e4d4e6] text-[#5c4365] border-[#8b6b93]'" 
                class="px-4 py-1 rounded-full text-xs font-bold border uppercase tracking-tighter">
            {{ video.tech }}
          </span>
        </div>

      </div>
    }

  </div>
</main>
