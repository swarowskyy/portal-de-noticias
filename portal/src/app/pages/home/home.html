<main class="max-w-7xl mx-auto px-4 py-8">
  
  <section class="mb-12 text-center">
    <h1 class="text-4xl font-extrabold text-gray-900 mb-4">DevNews Central</h1>
    <p class="text-lg text-gray-600 max-w-2xl mx-auto">
      Sua fonte diária de atualizações sobre o ecossistema de desenvolvimento. 
      Exploramos de Angular a Tailwind, trazendo as tendências que moldam o futuro do código.
    </p>
  </section>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    
    <article *ngFor="let item of noticias" 
             class="bg-white rounded-xl shadow-sm hover:shadow-xl transition-shadow duration-300 border border-gray-100 overflow-hidden">
      
      <img [src]="item.imagem" alt="Imagem da notícia" class="w-full h-48 object-cover">
      
      <div class="p-6">
        <span class="text-xs font-semibold text-blue-600 uppercase tracking-wider">
          {{ item.categoria }}
        </span>
        <h2 class="text-xl font-bold text-gray-800 mt-2 mb-3">
          {{ item.titulo }}
        </h2>
        <p class="text-gray-600 text-sm mb-4">
          {{ item.resumo }}
        </p>
        <div class="flex items-center justify-between mt-auto">
          <span class="text-gray-400 text-xs">{{ item.data }}</span>

        </div>
      </div>

    </article>

  </div>
</main>
