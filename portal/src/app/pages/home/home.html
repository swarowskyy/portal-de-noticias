<main class="max-w-7xl mx-auto px-4 py-8">

  <section class="mb-12 text-center">
    <h1 class="text-4xl font-extrabold text-[#4a3651] mb-4">Portal.News</h1>
    <p class="text-lg text-[#765a7c] max-w-2xl mx-auto">
      Um lar de atualizações sobre o ecossistema de desenvolvimento.
      Explore o Angular a Tailwind, trazendo as tendências que moldam o futuro do código.
      Venha conhecer!
    </p>
  </section>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

    <article *ngFor="let item of noticias"
             class="bg-[#fbf9fc] rounded-xl shadow-sm hover:shadow-xl transition-shadow duration-300 border border-[#e4d4e6] overflow-hidden">

      <img [src]="item.imagem" alt="Imagem da notícia" class="w-full h-48 object-cover">

      <div class="p-6">
        <span class="text-xs font-semibold text-[#A47DAB] uppercase tracking-wider">
          {{ item.categoria }}
        </span>
        <h2 class="text-xl font-bold text-[#5c4365] mt-2 mb-3">
          {{ item.titulo }}
        </h2>
        <p class="text-[#765a7c] text-sm mb-4">
          {{ item.resumo }}
        </p>
        <div class="flex items-center justify-between mt-auto">
          <span class="text-[#bda4c4] text-xs">{{ item.data }}</span>
        </div>
      </div>

    </article>

  </div>

</main>
