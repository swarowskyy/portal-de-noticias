<main class="max-w-7xl mx-auto px-4 py-12 bg-gray-50/50 min-h-screen">

  <section class="mb-16 text-center">
    <h1 class="text-5xl font-black mb-4 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-[#4a3651] to-[#765a7c]">
      Portal.News
    </h1>
    <p class="text-lg text-gray-600 max-w-2xl mx-auto leading-relaxed">
      Um lar de atualizações sobre o ecossistema de desenvolvimento. 
      Explore do <strong>Angular</strong> ao <strong>Tailwind</strong>, trazendo as tendências que moldam o futuro do código.
    </p>
    <div class="mt-4 h-1 w-20 bg-[#A47DAB] mx-auto rounded-full"></div>
  </section>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">

    <article *ngFor="let item of noticias" 
      class="group bg-white rounded-3xl border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 overflow-hidden flex flex-col">
      
      <div class="relative overflow-hidden">
        <img [src]="item.imagem" alt="Imagem da notícia" 
          class="w-full h-52 object-cover group-hover:scale-110 transition-transform duration-700">
        <div class="absolute top-4 left-4">
          <span class="bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-[#A47DAB] shadow-sm">
            {{ item.categoria }}
          </span>
        </div>
      </div>

      <div class="p-8 flex flex-col">
        <h2 class="text-2xl font-bold text-gray-800 leading-tight mb-3 group-hover:text-[#4a3651] transition-colors">
          {{ item.titulo }}
        </h2>
        
        <p class="text-gray-500 text-sm leading-relaxed mb-6 line-clamp-3">
          {{ item.resumo }}
        </p>

        <div class="mt-auto pt-6 border-t border-gray-50 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
              <span class="text-[10px] font-bold text-gray-400">PN</span>
            </div>
            <span class="text-[#bda4c4] text-xs font-medium">{{ item.data }}</span>
          </div>
          
          <button class="text-xs font-bold text-[#4a3651] hover:underline decoration-2 underline-offset-4">
            Ler mais →
          </button>
        </div>
      </div>

    </article>

  </div>

</main>
