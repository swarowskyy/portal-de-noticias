<main class="max-w-4xl mx-auto px-4 py-16">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-600">



        <div class="px-8 pb-12">



            <div class="px-8 pb-12 pt-10">
                <div class="text-center md:text-left">
                    <h1 class="text-5xl font-black text-gray-900 tracking-tight mb-2">
                        {{ nome }}
                    </h1>

                    <p class="text-blue-600 font-bold text-xl">
                        {{ cargo }}
                    </p>

                    <div class="mt-8 inline-block bg-gray-50 px-6 py-3 rounded-xl border border-dashed border-gray-300">
                        <p class="text-gray-500 italic font-medium">{{ frase }}</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mt-12">
                <div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-gray-400 mb-6 flex items-center">
                        <span class="w-8 bg-gray-200 mr-3"></span> Stack Tecnológica
                    </h3>
                    <div class="flex flex-wrap gap-3 max-w-xs">
                        @for (t of techs; track t) {
                        <span
                            class="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-bold shadow-sm hover:bg-blue-600 transition-colors">
                            {{ t }}
                        </span>
                        }
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-gray-400 mb-6 flex items-center">
                        <span class="w-8  bg-gray-200 mr-3"></span> Conecte-se Comigo
                    </h3>
                    <div class="space-y-4">
                        <a href="https://github.com/fanc1109" target="_blank"
                            class="flex items-center p-4 bg-gray-50 rounded-xl hover:bg-black hover:text-white transition-all group">
                            <span class="font-bold">GitHub Profissional</span>
                            <span class="ml-auto group-hover:translate-x-1 transition-transform">→</span>
                        </a>

                        <a href="https://www.linkedin.com/in/francy-schenkel" target="_blank"
                            class="flex items-center p-4 bg-blue-50 rounded-xl hover:bg-black hover:text-white transition-all group ">
                            <span class="font-bold">LinkedIn</span>
                            <span class="ml-auto group-hover:translate-x-1 transition-transform">→</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <p class="text-center text-gray-400 text-sm mt-8">
        Desenvolvido com ❤️ utilizando Angular & Tailwind CSS.
    </p>
</main>
